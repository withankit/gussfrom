<!DOCTYPE html>
<html lang="en">
<head>
    <title>Register form</title>
</head>
<body>
    <center>
        <h1>Register Form</h1>
     <form>
        <table border="9">
            <tr>
            <td>
           First Name :-
            </td>
            <td>
            <input type="text" name="Name">
            </td>
            <td> 
           Last Name :-
            </td>
            <td>
            <input type="text" name="Surname">
            </td>
        </tr>
        <tr>
            <td>
            Father Name :-
            </td>
            <td>
            <input type="text" name="father name">
            </td>
        </tr>
        <tr>
             <td>
            Mother Name :-
            </td>
            <td>
            <input type="text" name="mothe name">
            </td>
        </tr>
        <tr>
            <td>Email :-</td>
            <td>
            <input  type="email" name="Email">
            </td>
        </tr>
        <tr>
             <td>
            Password :-
            </td>
            <td>
            <input type="password" name="password">
            </td>
        </tr>
        <tr>
            <td>Phone No :-</td>
            <td>
            <input type="text" name="phone">
             </td>
        </tr>
        <tr>
            <td>
                standred :-
            </td>
            <td>
                <input type="text" name="standred">
            </td>
        </tr>
        <tr>
            <td>
                college name :-
            </td>
            <td>
                <input type="text" name="college name">
            </td>
        </tr>
        <tr>
            <td>
            Address :-
            </td>
            <td>
            <textarea name="Address">write your address</textarea>
            </td>
        </tr>
        <tr>
            <td>
                Date of Birth 
            </td>
            <td>
                <input type="date" name="date">
            </td>
        </tr>
        <tr>
            <td>
                Choose Your city -      
            </td>
            <td>
                <select name="city" ID="CITY">
                <option value="kolkata">kolkata</option>
                <option value="pune">pune</option>
                <option value="mumbai">mumbai</option>
                <option value="delhi">delhi</option>
                <option value="siddharth nagar">siddharth nagar</option>
                <option value="gorkhpur">gorkhpur</option>
                <option value="lucknow">lucknow</option>
                <option value="hyadrbad">hyadrbad</option>
                <option value="sikkim">sikkim</option>
                <option value="benglor">benglor</option>
                <option value="gudgava">gudgava</option>
                <option value="goa">goa</option>
                <option value="noida">noida</option>
                </select>
            </td>
        </tr>
        <tr>
            <td>
                choose Your Gender
            </td>
            <td>
                <input type="radio" name="Gender" value="male"> male
                <input type="radio" name="Gender" value="female">female
                <input type="radio" name="Gender" value="other">other
            </td>
        </tr>
        <tr>
                <td>
                    choose Your fevrate Game -
                </td>
                <td>
                    <input type="checkbox" name="interast" value="cricket">cricket
                    <input type="checkbox" name="interast" value="football">football
                    <input type="checkbox" name="interast" value="hockey">hockey
                    <input type="checkbox" name="interast" value="chess">chess
                </td>
        </tr>
        <tr>
            <td>
                <input type="submit" name="submit" value="submit">
            </td>
        </tr>
        </tr>
        </table>
    </form>
        </center>
    </body>
</html>
